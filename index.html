        function showForecast() {
            const moon = document.getElementById('moonSelect').value;
            const mercury = document.getElementById('mercurySelect').value;
            const resultDiv = document.getElementById('result');
            
            const text = forecasts[moon] && forecasts[moon][mercury];
            
            if (text) {
                resultDiv.innerText = text;
                resultDiv.style.display = 'block';
                localStorage.setItem('moon', moon);
                localStorage.setItem('mercury', mercury);
            } else {
                resultDiv.innerText = 'Прогноз не найден';
                resultDiv.style.display = 'block';
            }
        }

        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        const initTelegram = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const theme = tg.themeParams;
                if (theme.bg_color) {
                    const root = document.documentElement;
                    root.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                    root.style.setProperty('--tg-theme-text-color', theme.text_color);
                    root.style.setProperty('--tg-theme-button-color', theme.button_color);
                    root.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                    root.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
                    root.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                }
            }
        };

        window.onload = () => {
            initTelegram();
            const m = localStorage.getItem('moon');
            const merc = localStorage.getItem('mercury');
            if (m) document.getElementById('moonSelect').value = m;
            if (merc) document.getElementById('mercurySelect').value = merc;
