    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 8px;

        }
        .sub {
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .select-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--tg-theme-hint-color, #777);
        }
        
        /* Кастомный переключатель вариантов взамен системного select */
        .custom-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .option-btn {
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .option-btn.selected {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-color: var(--tg-theme-button-color, #2481cc);
        }

        button.main-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 14px;
        }

        // Переменные для хранения выбранных значений
        let selectedMoon = '';
        let selectedMercury = '';

        // Функция инициализации кликов на кастомные кнопки
        function initCustomSelects() {
            setupGroup('moonGroup', (val) => { selectedMoon = val; });
            setupGroup('mercuryGroup', (val) => { selectedMercury = val; });
        }

        function setupGroup(groupId, callback) {
            const container = document.getElementById(groupId);
            const buttons = container.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    callback(btn.getAttribute('data-value'));
                });
            });
        }

        function showForecast() {
            const resultDiv = document.getElementById('result');
            
            if (!selectedMoon || !selectedMercury) {
                resultDiv.innerText = 'Пожалуйста, выберите оба параметра.';
                resultDiv.style.display = 'block';
                return;
            }
            
            const text = forecasts[selectedMoon] && forecasts[selectedMoon][selectedMercury];
            
            if (text) {
                resultDiv.innerText = text;
                resultDiv.style.display = 'block';
                localStorage.setItem('moon', selectedMoon);
                localStorage.setItem('mercury', selectedMercury);
            } else {
                resultDiv.innerText = 'Прогноз не найден';
                resultDiv.style.display = 'block';
            }
        }

        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        const initTelegram = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const theme = tg.themeParams;
                if (theme.bg_color) {
                    const root = document.documentElement;
                    root.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                    root.style.setProperty('--tg-theme-text-color', theme.text_color);
                    root.style.setProperty('--tg-theme-button-color', theme.button_color);
                    root.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                    root.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
                    root.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                }
            }
        };

        // Восстановление сохраненных значений
        function restoreSelections() {
            const m = localStorage.getItem('moon');
            const merc = localStorage.getItem('mercury');
            
            if (m) {
                selectedMoon = m;
                const btn = document.querySelector(`#moonGroup .option-btn[data-value="${m}"]`);
                if (btn) btn.classList.add('selected');
            }
            if (merc) {
                selectedMercury = merc;
                const btn = document.querySelector(`#mercuryGroup .option-btn[data-value="${merc}"]`);
                if (btn) btn.classList.add('selected');
            }
        }

        window.onload = () => {
            initTelegram();
            initCustomSelects();
            restoreSelections();
        };
    </script>
