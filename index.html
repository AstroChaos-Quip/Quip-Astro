<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квип — прогноз по Луне и Меркурию</title>
    <!-- Подключаем Telegram WebApp скрипт для интеграции с TG -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            transition: background 0.2s;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .sub {
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .select-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            appearance: none;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
        .result {
            margin-top: 30px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #aaa);
            text-align: center;
        }
        hr {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: var(--tg-theme-hint-color, #ddd);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ИНДЕКС КВИПА. 28 марта</h1>
        <div class="sub">Выберите стихии Луны и Меркурия</div>

        <div class="select-group">
            <label>🌙 ЛУНА</label>
            <select id="moonSelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <div class="select-group">
            <label>☿ МЕРКУРИЙ</label>
            <select id="mercurySelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <button id="getForecastBtn">Получить прогноз</button>

        <div id="result" class="result"></div>
        <div class="footer">Квип. Астрология хаоса 🪬</div>
    </div>

                      const forecasts = {

                air: "🔥 Огонь Луна + 💨 Воздух Меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\n\nУтром мозг работает как швейцарские часы, вечером – как будильник, который кто-то перевёл. Важное – до полудня.",

            },
            earth: {
                fire: "🌍 Земля Луна + 🔥 Огонь Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nУтром можно побаловать себя, вечером – лучше не рисковать. Спонтанные покупки или слова могут аукнуться.",
                earth: "🌍 Земля Луна + 🌍 Земля Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nТвоя суперсила – спокойно пережить утренний шум и вечерний сюрприз. Не дергайся, всё идёт по плану, даже если кажется иначе.",
                air: "🌍 Земля Луна + 💨 Воздух Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nИдеи летают, но приземляться будут только те, что родились до вечернего сюрприза. Не гонись за всеми – возьми одну, остальные законспектируй.",
                water: "🌍 Земля Луна + 🌊 Вода Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nВечером чувства могут обмануть. Если что-то кажется важным – перепроверь утром. Сейчас лучше довериться рутине."
            },
            air: {
                fire: "💨 Воздух Луна + 🔥 Огонь Меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nУтром ты ловишь волну, вечером – пытаешься не утонуть. Не плыви против течения, просто пережди.",
                earth: "💨 Воздух Луна + 🌍 Земля Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nФОКУС  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nПлан есть, но удача сегодня не подружка. Действуй осторожно, без лишнего риска – лишняя осторожность сегодня не повредит.",
                air: "💨 Воздух Луна + 💨 Воздух Меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\n\nУтром ты гений, вечером – жертва обстоятельств. Важные решения – до обеда, после – только наблюдение.",
                water: "💨 Воздух Луна + 🌊 Вода Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nВечером не начинай важных разговоров – слова разлетятся, смысл потеряется. Лучше отложить до завтра."
            },
            water: {
                fire: "🌊 Вода Луна + 🔥 Огонь Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nЭмоции зашкаливают. Не держи в себе, но и не выливай на окружающих – лучше выплесни в движение или в подушку.",
                earth: "🌊 Вода Луна + 🌍 Земля Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nМысли ясны, но энергии маловато. Не берись за всё сразу, делай по одному делу, и успеешь больше.",
                air: "🌊 Вода Луна + 💨 Воздух Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\n\nИнтуиция – твой компас, но вечером стрелка может дрогнуть. Доверяй только утренним ощущениям, остальное – проверяй.",
                water: "🌊 Вода Луна + 🌊 Вода Меркурий\nДРАЙВ  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nЕсли внутри всё перемешалось – не ищи ответов сегодня. Ложись спать пораньше, утро вечера мудренее."
            }
        };

        // Функция сохранения выбора в localStorage
        function saveSelection(moon, mercury) {
            localStorage.setItem('moon', moon);
            localStorage.setItem('mercury', mercury);
        }

        // Функция загрузки сохранённого выбора
        function loadSelection() {
            const savedMoon = localStorage.getItem('moon');
            const savedMercury = localStorage.getItem('mercury');
            if (savedMoon) document.getElementById('moonSelect').value = savedMoon;
            if (savedMercury) document.getElementById('mercurySelect').value = savedMercury;
        }

        // Функция отображения прогноза
        function showForecast() {
            const moon = document.getElementById('moonSelect').value;
            const mercury = document.getElementById('mercurySelect').value;
            const forecastText = forecasts[moon] && forecasts[moon][mercury] ? forecasts[moon][mercury] : "Прогноз для такой пары пока не готов, но мы работаем над ним.";
            document.getElementById('result').innerText = forecastText;
            saveSelection(moon, mercury);
        }

        // Загружаем сохранённые значения при загрузке страницы
        loadSelection();

        // Обработчик кнопки
        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        // Если хотим сразу показать прогноз при загрузке (если уже есть выбор) — раскомментировать
        // showForecast();

        // Telegram WebApp: даём знать, что приложение готово
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // растягиваем на весь экран
            // можно менять цвета кнопок в зависимости от темы Telegram
            const theme = window.Telegram.WebApp.themeParams;
            if (theme) {
                document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color);
                document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color);
                document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
            }
        }
    </script>
</body>
</html>
