<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квип — прогноз по Луне и Меркурию</title>
    <!-- Подключаем Telegram WebApp скрипт для интеграции с TG -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            transition: background 0.2s;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .sub {
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .select-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            appearance: none;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
        .result {
            margin-top: 30px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #aaa);
            text-align: center;
        }
        hr {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: var(--tg-theme-hint-color, #ddd);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ИНДЕКС КВИПА. 29 марта</h1>
        <div class="sub">Выберите стихии Луны и Меркурия</div>

        <div class="select-group">
            <label>🌙 ЛУНА</label>
            <select id="moonSelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <div class="select-group">
            <label>☿ МЕРКУРИЙ</label>
            <select id="mercurySelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <button id="getForecastBtn">Получить прогноз</button>

        <div id="result" class="result"></div>
        <div class="footer">Квип. Астрология хаоса 🪬</div>
    </div>

    <script>
        // Здесь вы вставляете свои тексты прогнозов (можно заменить на свои)
        // Структура: [Луна][Меркурий] → текст
                              const forecasts = {
            fire: {
                fire: "🔥 огонь луна + 🔥 огонь меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nВнутренний напор есть, но он упирается в сопротивление среды. Лучше потратить силы на разбор того, что давно откладывал.",
                earth: "🔥 огонь луна + 🌍 земля меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nПлан есть, но он требует множества уточнений. Не бойся переделывать — это норма для сегодняшнего дня.",
                air: "🔥 огонь луна + 💨 воздух меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nИдей много, но они словно увязают в болоте. Выбери одну и начни её воплощать, не распыляясь на остальные.",
                water: "🔥 огонь луна + 🌊 вода меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\n\nИнтуиция подсказывает верные ходы. Сделай маленький шаг, проверь результат — и доверься тому, что чувствуешь."
            },
            earth: {
                fire: "🌍 земля луна + 🔥 огонь меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nСегодня твоя устойчивость — главный козырь. Не позволяй чужой спешке сбить тебя с ритма: делай по‑своему, и результат не заставит себя ждать.",
                earth: "🌍 земля луна + 🌍 земля меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nМысли чётки, дела идут, но избегай споров о том, что нельзя проверить цифрами. Всё, что может подождать до вечера, пусть подождёт.",
                air: "🌍 земля луна + 💨 воздух меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nУДАЧА  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nИдеи витают в воздухе. Выбери одну и начни оформлять — остальное запиши, они ещё пригодятся.",
                water: "🌍 земля луна + 🌊 вода меркурий\nДРАЙВ  🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\n\nТвоя чувствительность сегодня работает как радар, а земная луна не даёт уйти в фантазии. Доверяй первому впечатлению, но фиксируй его на бумаге — так ты не потеряешь нить."
            },
            air: {
                fire: "💨 воздух луна + 🔥 огонь меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nЭнергия бьёт через край, но она плохо управляема. Направь её в физическую активность или разбор технических вопросов — там она принесёт пользу.",
                earth: "💨 воздух луна + 🌍 земля меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\n\nПлан выстроен, но реальность постоянно вносит правки. Не спорь с обстоятельствами, лучше адаптируйся — гибкость сегодня важнее жёсткости.",
                air: "💨 воздух луна + 💨 воздух меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nМысли роятся, но нет почвы для опоры. Выбери одно направление и следуй ему — этого хватит, чтобы почувствовать твёрдую землю под ногами.",
                water: "💨 воздух луна + 🌊 вода меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nУДАЧА  🟥🟥🟥🟥⬜️⬜️⬜️⬜️⬜️⬜️ 40%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩⬜️⬜️ 80%\n\nИнтуиция говорит на языке, который твой разум ещё не выучил. Не пытайся переводить дословно, просто следуй за первым порывом — он приведёт туда, куда надо."
            },
            water: {
                fire: "🌊 вода луна + 🔥 огонь меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\nФОКУС  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nЭмоции рвутся наружу. Запиши, что чувствуешь, — это поможет отделить важное от наносного.",
                earth: "🌊 вода луна + 🌍 земля меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️ 60%\n\nМысли ясны, но сил для рывка маловато. Разбей большую задачу на мелкие шаги — каждый выполненный пункт добавит энергии.",
                air: "🌊 вода луна + 💨 воздух меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nФОКУС  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\n\nИнтуиция подсказывает неожиданные решения. Проверь их на практике — даже если кажутся странными, в них может быть зерно истины.",
                water: "🌊 вода луна + 🌊 вода меркурий\nДРАЙВ  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nРАЗУМ  🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\nФОКУС  🟨🟨🟨🟨🟨🟨🟨⬜️⬜️⬜️ 70%\nУДАЧА  🟨🟨🟨🟨🟨⬜️⬜️⬜️⬜️⬜️ 50%\nШАРМ   🟩🟩🟩🟩🟩🟩🟩🟩🟩⬜️ 90%\n\nВнутренний океан сегодня спокоен. Лучшее, что можно сделать, — позволить себе плыть по течению, не форсируя события."
            }
        };
        // Функция сохранения выбора в localStorage
        function saveSelection(moon, mercury) {
            localStorage.setItem('moon', moon);
            localStorage.setItem('mercury', mercury);
        }

        // Функция загрузки сохранённого выбора
        function loadSelection() {
            const savedMoon = localStorage.getItem('moon');
            const savedMercury = localStorage.getItem('mercury');
            if (savedMoon) document.getElementById('moonSelect').value = savedMoon;
            if (savedMercury) document.getElementById('mercurySelect').value = savedMercury;
        }

        // Функция отображения прогноза
        function showForecast() {
            const moon = document.getElementById('moonSelect').value;
            const mercury = document.getElementById('mercurySelect').value;
            const forecastText = forecasts[moon] && forecasts[moon][mercury] ? forecasts[moon][mercury] : "Прогноз для такой пары пока не готов, но мы работаем над ним.";
            document.getElementById('result').innerText = forecastText;
            saveSelection(moon, mercury);
        }

        // Загружаем сохранённые значения при загрузке страницы
        loadSelection();

        // Обработчик кнопки
        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        // Если хотим сразу показать прогноз при загрузке (если уже есть выбор) — раскомментировать
        // showForecast();

        // Telegram WebApp: даём знать, что приложение готово
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // растягиваем на весь экран
            // можно менять цвета кнопок в зависимости от темы Telegram
            const theme = window.Telegram.WebApp.themeParams;
            if (theme) {
                document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color);
                document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color);
                document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
            }
        }
    </script>
</body>
</html>
