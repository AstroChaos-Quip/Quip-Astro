<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квип — прогноз по Луне и Меркурию</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .sub {
            color: var(--tg-theme-hint-color, #999);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .select-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid var(--tg-theme-button-color, #2481cc);
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            appearance: none;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            opacity: 0.7;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            display: none; /* Скрыт, пока нет прогноза */
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #aaa);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ИНДЕКС КВИПА. 20 апреля</h1>
        <div class="sub">Выберите стихии Луны и Меркурия</div>

        <div class="select-group">
            <label>🌙 ЛУНА</label>
            <select id="moonSelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <div class="select-group">
            <label>☿ МЕРКУРИЙ</label>
            <select id="mercurySelect">
                <option value="fire">Огонь (Овен, Лев, Стрелец)</option>
                <option value="earth">Земля (Телец, Дева, Козерог)</option>
                <option value="air">Воздух (Близнецы, Весы, Водолей)</option>
                <option value="water">Вода (Рак, Скорпион, Рыбы)</option>
            </select>
        </div>

        <button id="getForecastBtn">Получить прогноз</button>

        <div id="result" class="result"></div>
        <div class="footer">Прогноз носит рекомендательный характер</div>
    </div>

    <script>
        // Объект с данными прогнозов
        const forecastData = {
            fire: {
                fire: "Огонь + Огонь\n\nДрайв · 🟨🟨🟨🟨🟨🟨🟨 70%\nРазум · 🟨🟨🟨🟨🟨 50%\nФокус · 🟨🟨🟨🟨🟨 50%\nУдача · 🟨🟨🟨🟨🟨🟨 60%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\n\nПокупки: Берите только наличные. Карта сегодня приведёт к лишним тратам.\n\nДом: Протрите зеркала. Чистые стёкла создадут ощущение порядка.\n\nКухня: Запеките курицу с картофелем на одном противне.\n\nДела: Делегируйте задачи. Вы переоцениваете свою скорость.\n\nФинансы: Отложите фиксированную сумму в конверт.",
                earth: "Огонь + Земля\n\nДрайв · 🟥🟥🟥🟥 40%\nРазум · 🟨🟨🟨🟨🟨🟨 60%\nФокус · 🟨🟨🟨🟨🟨🟨🟨 70%\nУдача · 🟥🟥🟥🟥 40%\nШарм · 🟨🟨🟨🟨🟨 50%\n\nПокупки: Список за час до выхода — залог успеха.\n\nДом: Выбросьте накипь из чайника и замените губки.\n\nКухня: Сварите суп на два дня вперёд.\n\nДела: Все важные разговоры — до обеда.\n\nФинансы: Не проверяйте баланс до полудня.",
                air: "Огонь + Воздух\n\nДрайв · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nРазум · 🟨🟨🟨🟨🟨🟨🟨 70%\nФокус · 🟥🟥🟥 30%\nУдача · 🟨🟨🟨🟨🟨 50%\nШарм · 🟨🟨🟨🟨🟨🟨🟨 70%\n\nПокупки: Только цифровые товары и подписки.\n\nДом: Разберите корзину со спамом в почте.\n\nКухня: Смузи и тосты. Ничего не режьте ножом.\n\nДела: Записывайте идеи голосом, не структурируйте.\n\nФинансы: Наличные сейчас надёжнее безнала.",
                water: "Огонь + Вода\n\nДрайв · 🟨🟨🟨🟨🟨 50%\nРазум · 🟥🟥🟥🟥 40%\nФокус · 🟥🟥🟥🟥🟥 50%\nУдача · 🟨🟨🟨🟨🟨🟨 60%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\n\nПокупки: Цветы в горшке или увлажнитель воздуха.\n\nДом: Ванна с солью важнее любой уборки.\n\nКухня: Уха или суп с морепродуктами.\n\nДела: Только дела семьи и дома.\n\nФинансы: Напомните должникам о себе."
            },
            earth: {
                fire: "Земля + Огонь\n\nДрайв · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\nРазум · 🟨🟨🟨🟨🟨 50%\nФокус · 🟨🟨🟨🟨🟨 50%\nУдача · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\n\nПокупки: Качественный инструмент или посуда.\n\nДом: Почините текущий кран — это даст энергию.\n\nКухня: Плов в казане — ваш союзник.\n\nДела: Доведите до конца самое старое дело.\n\nФинансы: Вклад с ежедневным процентом.",
                earth: "Земля + Земля\n\nДрайв · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nРазум · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nФокус · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nУдача · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\n\nПокупки: Одна дорогая вещь базового гардероба.\n\nДом: Полная ревизия кладовки.\n\nКухня: Запеките мясо в рукаве целиком.\n\nДела: Лучший день для расчистки хвостов.\n\nФинансы: Покупка облигаций.",
                air: "Земля + Воздух\n\nДрайв · 🟥🟥🟥 30%\nРазум · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\nФокус · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nУдача · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\n\nПокупки: Наушники, роутер или внешний диск.\n\nДом: Цифровая гигиена — обновите пароли.\n\nКухня: Закажите доставку азиатской еды.\n\nДела: Резервная копия всех файлов.\n\nФинансы: Отмените ненужные подписки.",
                water: "Земля + Вода\n\nДрайв · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\nРазум · 🟨🟨🟨🟨🟨🟨 60%\nФокус · 🟨🟨🟨🟨🟨🟨🟨 70%\nУдача · 🟩🟩🟩🟩🟩🟩🟩🟩🟩 90%\nШарм · 🟩🟩🟩🟩🟩🟩🟩🟩 80%\n\nПокупки: Комнатное растение в керамике.\n\nДом: Полейте цветы и протрите листья.\n\nКухня: Тыквенный суп-пюре со сливками.\n\nДела: Пауза в переговорах на полчаса.\n\nФинансы: Инвестиции в уход за телом."
            },
            air: {
                fire: "Воздух + Огонь\n\nПокупки: Онлайн-курс или подписка.\nДом: Выбросьте старые чеки и квитанции.\nКухня: Творожная запеканка.\nДела: Дистанционный формат лучше живых встреч.\nФинансы: Наличные разных номиналов.",
                earth: "Воздух + Земля\n\nПокупки: Бумажный ежедневник.\nДом: Протрите зеркала до блеска.\nКухня: Гречневая каша с грибами.\nДела: Короткие звонки по 5 минут.\nФинансы: Снимите наличные.",
                air: "Воздух + Воздух\n\nПокупки: Подписка на музыку или книги.\nДом: Проветривание в течение часа.\nКухня: Свежевыжатый сок.\nДела: Один короткий пост в соцсети.\nФинансы: Мелкие деньги на кофе и такси.",
                water: "Воздух + Вода\n\nПокупки: Аромалампа и масла.\nДом: Зажгите свечи, включите музыку.\nКухня: Травяной чай с мёдом.\nДела: Письмо старым друзьям.\nФинансы: Небольшое пожертвование."
            },
            water: {
                fire: "Вода + Огонь\n\nПокупки: Билет на концерт или выставку.\nДом: Вымойте окна до прозрачности.\nКухня: Рыба с лимоном и укропом.\nДела: Твёрдое «нет» чужим задачам.\nФинансы: Мягкое напоминание о долге.",
                earth: "Вода + Земля\n\nПокупки: Керамический горшок и земля.\nДом: Опрыскайте листья растений водой.\nКухня: Томлёная свинина в горшочке.\nДела: Молчание сегодня весомее слов.\nФинансы: Покупки для душа и ванны.",
                air: "Вода + Воздух\n\nПокупки: Увлажнитель воздуха.\nДом: Влажная уборка с эфирным маслом.\nКухня: Суп-пюре из брокколи.\nДела: Эмоциональная разгрузка.\nФинансы: Фильтр для воды.",
                water: "Вода + Вода\n\nПокупки: Термос или соковыжималка.\nДом: Ванна с пеной — главный приоритет.\nКухня: Домашний лимонад или компот.\nДела: Не принимайте решений, плывите по течению.\nФинансы: Заморозьте крупные платежи на день."
            }
        };

        function showForecast() {
            const moon = document.getElementById('moonSelect').value;
            const mercury = document.getElementById('mercurySelect').value;
            const resultDiv = document.getElementById('result');
            
            const text = forecastData[moon][mercury];
            
            resultDiv.innerText = text;
            resultDiv.style.display = 'block';
            
            // Сохраняем выбор
            localStorage.setItem('moon', moon);
            localStorage.setItem('mercury', mercury);
        }

        // Кнопка
        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        // Интеграция с Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            const theme = tg.themeParams;
            if (theme.bg_color) {
                document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color);
                document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color);
                document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
                document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color);
            }
        }

        // Загрузка сохраненных данных
        window.onload = () => {
            const m = localStorage.getItem('moon');
            const merc = localStorage.getItem('mercury');
            if (m) document.getElementById('moonSelect').value = m;
            if (merc) document.getElementById('mercurySelect').value = merc;
        };
    </script>
</body>
</html>
