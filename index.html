        // Функция сохранения выбора в localStorage
        function saveSelection(moon, mercury) {
            localStorage.setItem('moon', moon);
            localStorage.setItem('mercury', mercury);
        }

        // Функция загрузки сохранённого выбора
        function loadSelection() {
            const savedMoon = localStorage.getItem('moon');
            const savedMercury = localStorage.getItem('mercury');
            if (savedMoon) document.getElementById('moonSelect').value = savedMoon;
            if (savedMercury) document.getElementById('mercurySelect').value = savedMercury;
        }

        // Функция отображения прогноза
        function showForecast() {
            const moon = document.getElementById('moonSelect').value;
            const mercury = document.getElementById('mercurySelect').value;
            const forecastText = forecasts[moon] && forecasts[moon][mercury] ? forecasts[moon][mercury] : "Прогноз для такой пары пока не готов, но мы работаем над ним.";
            document.getElementById('result').innerText = forecastText;
            saveSelection(moon, mercury);
        }

        // Загружаем сохранённые значения при загрузке страницы
        loadSelection();

        // Обработчик кнопки
        document.getElementById('getForecastBtn').addEventListener('click', showForecast);

        // Если хотим сразу показать прогноз при загрузке (если уже есть выбор) — раскомментировать
        // showForecast();

        // Telegram WebApp: даём знать, что приложение готово
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // растягиваем на весь экран
            // можно менять цвета кнопок в зависимости от темы Telegram
            const theme = window.Telegram.WebApp.themeParams;
            if (theme) {
                document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color);
                document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color);
                document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
            }
        }
    </script>
